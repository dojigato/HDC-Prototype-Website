<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 210">

  <!-- ===== TOOTH / IMPLANT ICON (left) ===== -->

  <!-- Main crown body — dark blue -->
  <path fill="#1B4D8E" d="
    M 60,10
    C 78,2 88,18 95,26
    C 102,18 112,2 130,10
    C 158,22 176,58 174,92
    C 172,118 158,136 144,142
    L 120,170
    L 70,170
    L 46,142
    C 32,136 18,118 16,92
    C 14,58 32,22 60,10 Z
  "/>

  <!-- Left-side lighter blue highlight (depth effect) -->
  <path fill="#4E83BE" d="
    M 60,10
    C 78,2 88,18 95,26
    L 95,170
    L 70,170
    L 46,142
    C 32,136 18,118 16,92
    C 14,58 32,22 60,10 Z
  " opacity="0.55"/>

  <!-- White H letterform cutout -->
  <!-- Left vertical bar -->
  <rect fill="white" x="43" y="30" width="21" height="94" rx="3"/>
  <!-- Right vertical bar -->
  <rect fill="white" x="126" y="30" width="21" height="94" rx="3"/>
  <!-- Horizontal crossbar -->
  <rect fill="white" x="43" y="68" width="104" height="17"/>

  <!-- V-notch at crown base -->
  <path fill="#1B4D8E" d="M 84,168 L 95,155 L 106,168 Z"/>

  <!-- Gold implant screw below crown -->
  <rect fill="#A8906A" x="86" y="170" width="18" height="6" rx="1"/>
  <!-- Thread lines (wider at top, slightly narrower downward) -->
  <path stroke="#A8906A" stroke-width="3" fill="none" stroke-linecap="round"
        d="M 82,179 Q 95,186 108,179"/>
  <path stroke="#A8906A" stroke-width="3" fill="none" stroke-linecap="round"
        d="M 80,187 Q 95,194 110,187"/>
  <path stroke="#A8906A" stroke-width="3" fill="none" stroke-linecap="round"
        d="M 79,195 Q 95,202 111,195"/>
  <path stroke="#A8906A" stroke-width="2.5" fill="none" stroke-linecap="round"
        d="M 78,202 Q 95,208 112,202"/>

  <!-- ===== HDC LETTERS (right) ===== -->

  <!-- "H" — dark blue -->
  <text x="212" y="130"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="113" font-weight="900"
        fill="#1B4D8E">H</text>

  <!-- "D" — dark blue -->
  <text x="292" y="130"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="113" font-weight="900"
        fill="#1B4D8E">D</text>

  <!-- "C" — gold / tan -->
  <text x="376" y="130"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="113" font-weight="900"
        fill="#A8906A">C</text>

  <!-- Blue smile arc inside the C opening -->
  <path stroke="#4E83BE" stroke-width="7" fill="none" stroke-linecap="round"
        d="M 387,42 Q 448,73 387,104"/>

  <!-- ===== TAGLINES ===== -->

  <!-- "health dental care" -->
  <text x="212" y="162"
        font-family="Arial, sans-serif"
        font-size="27" font-weight="700"
        fill="#1B4D8E">health dental care</text>

  <!-- Italic tagline -->
  <text x="212" y="186"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16" font-style="italic"
        fill="#1B4D8E">Your healthy and beautiful smile is our priority</text>

</svg>
